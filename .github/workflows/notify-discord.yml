name: Notify Discord on Update

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/*'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get event summary
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "type=push" >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.head_commit.message }}" >> "$GITHUB_OUTPUT"
            echo "url=${{ github.event.head_commit.url }}" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.head_commit.author.name || github.actor }}" >> "$GITHUB_OUTPUT"

            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              files=$(git show --pretty="" --name-only "${{ github.sha }}" | head -20 | paste -sd ', ' -)
            else
              files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | head -20 | paste -sd ', ' -)
            fi

            if [ -z "$files" ]; then
              files="No file changes detected"
            fi

            echo "files=$files" >> "$GITHUB_OUTPUT"
          else
            echo "type=pr" >> "$GITHUB_OUTPUT"

            if [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              pr_state="merged"
            else
              pr_state="${{ github.event.action }}"
            fi

            echo "title=PR #${{ github.event.pull_request.number }} (${pr_state}): ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
            echo "url=${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.pull_request.user.login || github.actor }}" >> "$GITHUB_OUTPUT"
            echo "files=See PR for details" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to Discord
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_NAME: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          EVENT_TYPE: ${{ steps.diff.outputs.type }}
          MESSAGE_TITLE: ${{ steps.diff.outputs.title }}
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
          AUTHOR_NAME: ${{ steps.diff.outputs.author }}
          TARGET_URL: ${{ steps.diff.outputs.url }}
        shell: bash
        run: |
          MESSAGE=$(cat <<EOF
[REPO_UPDATE]
Repo: ${REPO_NAME}
Branch: ${BRANCH_NAME}
Type: ${EVENT_TYPE}
Commit: ${COMMIT_SHA}
Message: ${MESSAGE_TITLE}
Files: ${CHANGED_FILES}
Author: ${AUTHOR_NAME}
URL: ${TARGET_URL}
EOF
          )

          payload=$(jq -n --arg content "$MESSAGE" '{content: $content}')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"